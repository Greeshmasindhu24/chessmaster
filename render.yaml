# Render Blueprint — deploy from ChessMasterPro folder (or set Root Directory to ChessMasterPro)
# Docs: docs/RENDER.md

databases:
  - name: chessmaster-db
    plan: free
    databaseName: chessmaster
    user: chess

services:
  # Backend API (Docker — includes Stockfish on Linux)
  - type: web
    name: chessmaster-api
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chessmaster-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: REDIS_ENABLED
        value: "false"
      - key: STOCKFISH_PATH
        value: /usr/games/stockfish
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

  # Frontend static site (Vite build)
  - type: web
    name: chessmaster-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
