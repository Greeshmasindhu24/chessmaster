# Render Blueprint — no Render Postgres (free tier allows only 1 DB per account).
# Use Neon free Postgres: https://neon.tech → copy connection string → set DATABASE_URL on chessmaster-api.

services:
  - type: web
    name: chessmaster-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: REDIS_ENABLED
        value: "false"
      - key: STOCKFISH_PATH
        value: /usr/games/stockfish
      - key: FRONTEND_URL
        value: https://chessmaster-web.onrender.com
      - key: CORS_ORIGINS
        value: '["https://chessmaster-web.onrender.com"]'
      # Optional: allow local Vite against prod API (normally use local backend + proxy)
      # - key: CORS_DEV_ORIGINS
      #   value: '["http://localhost:5173","http://127.0.0.1:5173"]'

  - type: web
    name: chessmaster-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://chessmaster-api.onrender.com
      - key: VITE_PLAY_MVP
        value: "true"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
