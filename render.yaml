# Render Blueprint — https://github.com/Greeshmasindhu24/chessmaster
# Env URLs are pre-set; update in Render dashboard if your service URLs differ.

databases:
  - name: chessmaster-db
    plan: free
    databaseName: chessmaster
    user: chess

services:
  - type: web
    name: chessmaster-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chessmaster-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: REDIS_ENABLED
        value: "false"
      - key: STOCKFISH_PATH
        value: /usr/games/stockfish
      - key: FRONTEND_URL
        value: https://chessmaster-web.onrender.com
      - key: CORS_ORIGINS
        value: '["https://chessmaster-web.onrender.com"]'

  - type: web
    name: chessmaster-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://chessmaster-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
